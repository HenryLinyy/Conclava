name: CI

on:
  workflow_dispatch:
  push:
    branches: [main, develop, gate/*]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: macos-latest  # Keep CI aligned with the supported host OS.
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run pytest
        env:
          # CI runs without real LM Studio / ds4 — set test-safe defaults
          FUSION_DEFAULT_PRESET: budget
          FUSION_MAX_RETRIES: 0
        run: |
          pytest tests/ -q --tb=short --maxfail=5

      - name: Coverage report
        run: |
          pytest tests/ --tb=short --cov=conclava --cov=conclava_sdk --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

  lint:
    name: Lint (Python 3.12)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: |
          ruff check conclava conclava_sdk tests
          ruff format --check conclava conclava_sdk tests
